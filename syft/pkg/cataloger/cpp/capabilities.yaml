            - '**/conan.lock'
        metadata_types: # AUTO-GENERATED
          - pkg.ConanV1LockEntry
          - pkg.ConanV2LockEntry
        package_types: # AUTO-GENERATED
          - conan
        purl_types: # AUTO-GENERATED
