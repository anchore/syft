# This file is partially auto-generated. Run 'go generate ./internal/capabilities' to regenerate.
# Fields marked AUTO-GENERATED will be updated during regeneration.
# All 'capabilities' sections are MANUAL - edit these to describe cataloger behavior.

# CAPABILITY SECTIONS:
#   There are two types of capability sections depending on cataloger type:

#   1. Generic catalogers (type=generic): Have capabilities at the PARSER level
#      - Each parser function has its own capabilities section
#      - Allows different parsers within the same cataloger to have different capabilities

#   2. Custom catalogers (type=custom): Have capabilities at the CATALOGER level
#      - Single capabilities section for the entire cataloger

# ENRICHMENT MODES:
#   Capabilities are organized by enrichment mode, which describes how cataloging is performed:
#   - offline: Uses only information in the artifact itself (default, most common)
#   - online: May fetch additional metadata from external sources (registries, APIs)
#   - tool-execution: Requires executing tools or binaries in the artifact

# CAPABILITY FIELDS:
#   Each capability section can specify what information can be discovered:

#   license: (boolean)
#     Whether license information is available.
#     Example: true

#   dependencies:
#     Information about dependency discovery.

#     reach: (array of strings)
#       Which dependency depths can be discovered.
#       Values: "direct" (immediate deps), "indirect" (transitive deps)
#       Examples:
#         - ["direct"]               # only immediate dependencies
#         - ["direct", "indirect"]   # full transitive closure

#     topology: (string)
#       Completeness of the dependency graph structure.
#       Values:
#         - "none"     # dependencies found but no edges between them
#         - "flat"     # there is a single level of dependencies with edges to the root package only
#         - "reduced"  # transitive reduction (redundant edges removed)
#         - "complete" # dependencies found with all relationships with accurate direct and indirect edges
#       Example: "complete"

#     kinds: (array of strings)
#       Types of dependencies that can be discovered.
#       Values: "runtime", "dev", "build", "optional"
#       Examples:
#         - ["runtime"]                    # production dependencies only
#         - ["runtime", "dev"]             # production and development
#         - ["runtime", "dev", "build"]    # all dependency types

#   package_manager:
#     Package manager-specific metadata.

#     files:
#       File-related metadata from package manager records.

#       listing: (boolean)
#         Whether file listings are available (which files belong to the package).
#         Example: true

#       digests: (boolean)
#         Whether file digests/checksums are included in listings.
#         Example: true

#     package_integrity_hash: (boolean)
#       Whether a hash for verifying package integrity is available.
#       Example: true

# EXAMPLES:

#   # Minimal capabilities (no additional metadata)
#   capabilities:
#     offline:
#       license: false
#       dependencies:
#         reach: []
#         topology: none
#         kinds: []
#       package_manager:
#         files:
#           listing: false
#           digests: false
#         package_integrity_hash: false

#   # Full metadata with dependency graph
#   capabilities:
#     offline:
#       license: true
#       dependencies:
#         reach:
#           - direct
#           - indirect
#         topology: complete
#         kinds:
#           - runtime
#           - dev
#       package_manager:
#         files:
#           listing: true
#           digests: true
#         package_integrity_hash: true

